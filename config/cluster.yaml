environment: docker-simulation

paths:
  raw_dir: data/raw
  raw_file: data/raw/flight_data_2024.csv
  prepared_dir: data/prepared
  prepared_file: data/prepared/flights_2024_clean.parquet
  generated_dir: data/generated
  outputs_dir: outputs
  results_dir: experiments/results/cluster

spark:
  master: spark://spark-master:7077
  app_name: flight-delay-big-data-analysis-docker-simulation
  shuffle_partitions: 16
  driver_host: spark-driver
  driver_bind_address: 0.0.0.0

benchmark:
  cluster_size: "docker-compose Spark standalone: 1 master + 2 workers; Hive single-node container"
  spark_driver_service: spark-driver
  container_workspace: /workspace
  input_sizes:
    - label: 100k
      records: 100000
      path: data/generated/flights_100k.parquet
    - label: 500k
      records: 500000
      path: data/generated/flights_500k.parquet
    - label: 1m
      records: 1000000
      path: data/generated/flights_1m.parquet

cluster_notes:
  spark_topology: "Spark standalone on Docker Compose with one master and two workers."
  hive_topology: "Existing Docker HiveServer2/metastore/Postgres stack; not distributed HDFS/YARN."
  limitation: "All containers share one host, one local disk, and Docker Desktop resource limits."
