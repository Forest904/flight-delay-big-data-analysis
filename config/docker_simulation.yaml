environment: docker-simulation

paths:
  raw_dir: data/raw
  raw_file: data/raw/flight_data_2024.csv
  prepared_dir: data/prepared
  prepared_file: data/prepared/flights_2024_clean.parquet
  generated_dir: data/generated
  outputs_dir: outputs
  results_dir: experiments/results/docker-simulation

spark:
  master: spark://spark-master:7077
  app_name: flight-delay-big-data-analysis-docker-simulation
  shuffle_partitions: 16
  driver_host: spark-driver
  driver_bind_address: 0.0.0.0

benchmark:
  execution_setting: "docker-compose Spark standalone: 1 master + 2 workers; Hive single-node container"
  spark_driver_service: spark-driver
  container_workspace: /workspace
  input_sizes:
    - label: 100k
      records: 100000
      path: data/generated/flights_100k.parquet
    - label: 500k
      records: 500000
      path: data/generated/flights_500k.parquet
    - label: 1m
      records: 1000000
      path: data/generated/flights_1m.parquet
    - label: 3m
      records: 3000000
      path: data/generated/flights_3m.parquet
      optional: true
    - label: full
      records: 7079081
      path: data/prepared/flights_2024_clean.parquet
      method: prepared_reference
      records_source: manifest_actual_records
      optional: true
    - label: 14m
      records: 14000000
      path: data/generated/flights_14m.parquet
      method: controlled_replication
      optional: true
    - label: 28m
      records: 28000000
      path: data/generated/flights_28m.parquet
      method: controlled_replication
      optional: true
    - label: 1m_hc8
      records: 1000000
      path: data/generated/flights_1m_hc8.parquet
      method: controlled_high_cardinality_suffix
      input_kind: high_cardinality_stress
      optional: true

docker_simulation_notes:
  spark_topology: "Spark standalone on Docker Compose with one master and two workers."
  hive_topology: "Existing Docker HiveServer2/metastore/Postgres stack; no HDFS/YARN service."
  limitation: "All containers share one host, one local disk, and Docker Desktop resource limits."
