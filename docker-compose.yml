name: flight-delay-big-data-analysis

services:
  spark-core:
    build:
      context: .
      dockerfile: Dockerfile.spark-core
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      PYTHONUNBUFFERED: "1"
    command: python src/spark_core/run_spark_core.py

  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark-core
    hostname: spark-master
    working_dir: /workspace
    environment:
      PYTHONUNBUFFERED: "1"
      SPARK_NO_DAEMONIZE: "1"
    ports:
      - "7077:7077"
      - "18080:8080"
    volumes:
      - .:/workspace
    command:
      - spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import socket; s=socket.create_connection(('spark-master', 7077), 5); s.close()\"",
        ]
      interval: 5s
      timeout: 10s
      retries: 30

  spark-worker-1:
    build:
      context: .
      dockerfile: Dockerfile.spark-core
    hostname: spark-worker-1
    working_dir: /workspace
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: "1"
      SPARK_NO_DAEMONIZE: "1"
    ports:
      - "18081:8081"
    volumes:
      - .:/workspace
    command:
      - spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --host
      - spark-worker-1
      - --webui-port
      - "8081"
      - --cores
      - "2"
      - --memory
      - 2g
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8081', timeout=5).close()\"",
        ]
      interval: 5s
      timeout: 10s
      retries: 30

  spark-worker-2:
    build:
      context: .
      dockerfile: Dockerfile.spark-core
    hostname: spark-worker-2
    working_dir: /workspace
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: "1"
      SPARK_NO_DAEMONIZE: "1"
    ports:
      - "18082:8081"
    volumes:
      - .:/workspace
    command:
      - spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --host
      - spark-worker-2
      - --webui-port
      - "8081"
      - --cores
      - "2"
      - --memory
      - 2g
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8081', timeout=5).close()\"",
        ]
      interval: 5s
      timeout: 10s
      retries: 30

  spark-driver:
    build:
      context: .
      dockerfile: Dockerfile.spark-core
    hostname: spark-driver
    working_dir: /workspace
    depends_on:
      spark-master:
        condition: service_healthy
      spark-worker-1:
        condition: service_healthy
      spark-worker-2:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - .:/workspace
    command: sleep infinity

  hive-postgres:
    image: postgres:17.2-bookworm
    environment:
      POSTGRES_DB: metastore_db
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    volumes:
      - hive_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  hive-metastore:
    build:
      context: .
      dockerfile: Dockerfile.hive
    depends_on:
      hive-postgres:
        condition: service_healthy
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      HOME: /tmp
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://hive-postgres:5432/metastore_db
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
    ports:
      - "9083:9083"
    volumes:
      - .:/workspace
      - hive_warehouse:/opt/hive/data/warehouse
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9083'"]
      interval: 5s
      timeout: 5s
      retries: 30

  hiveserver2:
    build:
      context: .
      dockerfile: Dockerfile.hive
    depends_on:
      hive-metastore:
        condition: service_healthy
    working_dir: /workspace
    environment:
      SERVICE_NAME: hiveserver2
      IS_RESUME: "true"
      HOME: /tmp
      SERVICE_OPTS: >-
        -Dhive.metastore.uris=thrift://hive-metastore:9083
    ports:
      - "10000:10000"
      - "10002:10002"
    volumes:
      - .:/workspace
      - hive_warehouse:/opt/hive/data/warehouse

volumes:
  hive_postgres_data:
  hive_warehouse:
