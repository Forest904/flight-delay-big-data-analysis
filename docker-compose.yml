name: flight-delay-big-data-analysis

services:
  spark-core:
    build:
      context: .
      dockerfile: Dockerfile.spark-core
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      PYTHONUNBUFFERED: "1"
    command: python src/spark_core/run_spark_core.py

  hive-postgres:
    image: postgres:17.2-bookworm
    environment:
      POSTGRES_DB: metastore_db
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    volumes:
      - hive_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  hive-metastore:
    build:
      context: .
      dockerfile: Dockerfile.hive
    depends_on:
      hive-postgres:
        condition: service_healthy
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      HOME: /tmp
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://hive-postgres:5432/metastore_db
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
    ports:
      - "9083:9083"
    volumes:
      - .:/workspace
      - hive_warehouse:/opt/hive/data/warehouse
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9083'"]
      interval: 5s
      timeout: 5s
      retries: 30

  hiveserver2:
    build:
      context: .
      dockerfile: Dockerfile.hive
    depends_on:
      hive-metastore:
        condition: service_healthy
    working_dir: /workspace
    environment:
      SERVICE_NAME: hiveserver2
      IS_RESUME: "true"
      HOME: /tmp
      SERVICE_OPTS: >-
        -Dhive.metastore.uris=thrift://hive-metastore:9083
    ports:
      - "10000:10000"
      - "10002:10002"
    volumes:
      - .:/workspace
      - hive_warehouse:/opt/hive/data/warehouse

volumes:
  hive_postgres_data:
  hive_warehouse:
